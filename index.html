/* GOSI — الأساس: أساسي + سكن، بحد أقصى 45,000 */
function gosi(emp) {
  const base = Math.min((+emp.basic || 0) + (+emp.housing || 0), 45000);
  if (emp.nationality === "saudi") return { emp: base * 0.0975, er: base * 0.1175 };
  return { emp: 0, er: base * 0.02 };
}
function payroll(emp, advances = [], penalties = []) {
  const gross = (+emp.basic || 0) + (+emp.housing || 0) + (+emp.transport || 0) + (+emp.other || 0);
  const g = gosi(emp);
  const ded = +emp.deductions || 0;
  const adv = advances
    .filter((a) => a.empId === emp.id && a.amount - a.paid > 0)
    .reduce((s, a) => s + Math.min(+a.installment || 0, a.amount - a.paid), 0);
  const pen = penalties
    .filter((x) => x.empId === emp.id && !x.settled && +x.amount > 0)
    .reduce((s, x) => s + +x.amount, 0);
  return { gross, gosiEmp: g.emp, gosiEr: g.er, ded, adv, pen, net: gross - g.emp - ded - adv - pen };
}
/* التأخير: مقارنة وقت الحضور بوقت بداية الدوام */
function lateMin(rec, emp) {
  if (!rec?.in || !emp.workStart) return 0;
  const [h1, m1] = rec.in.split(":").map(Number);
  const [h2, m2] = emp.workStart.split(":").map(Number);
  return Math.max(0, h1 * 60 + m1 - (h2 * 60 + m2));
}
function normalize(d) {
  d.advances = d.advances || [];
  d.notifications = d.notifications || [];
  d.payrollRuns = d.payrollRuns || [];
  d.requests = d.requests || [];
  d.assets = d.assets || [];
  d.penalties = d.penalties || [];
  d.payments = d.payments || [];
  d.clearances = d.clearances || [];
  if (!d.holidays) {
    const y = new Date().getFullYear();
    d.holidays = [
      { id: uid(), name: "يوم التأسيس", from: `${y}-02-22`, to: `${y}-02-22` },
      { id: uid(), name: "اليوم الوطني", from: `${y}-09-23`, to: `${y}-09-23` },
    ];
  }
  return d;
}
const activeEmps = (d) => d.employees.filter((e) => !e.archived);
const isHoliday = (holidays, dateStr) => (holidays || []).find((h) => h.from <= dateStr && dateStr <= h.to) || null;
const PEN_TYPES = { notice: "لفت نظر", warning: "إنذار كتابي", deduct: "خصم مالي" };
const LEAVE_TYPES = { annual: "سنوية", sick: "مرضية", unpaid: "بدون راتب" };
function usedLeaveDays(leaves, empId) {
  const yr = new Date().getFullYear();
  return leaves
    .filter((l) => l.empId === empId && l.status === "approved" && (l.type || "annual") === "annual" && new Date(l.from).getFullYear() === yr)
    .reduce((s, l) => s + l.days, 0);
}
/* من في إجازة بتاريخ معين */
function onLeaveToday(leaves, empId, dateStr) {
  return leaves.some((l) => l.empId === empId && l.status === "approved" && l.from <= dateStr && dateStr <= l.to);
}
function notify(d, empId, text) {
  d.notifications.unshift({ id: uid(), empId, text, date: new Date().toISOString(), read: false });
  d.notifications = d.notifications.slice(0, 200);
}
/* مكافأة نهاية الخدمة (نظام العمل): نصف شهر عن كل سنة من أول ٥ سنوات، وشهر كامل بعدها — على الأجر الشامل */
function eosGratuity(emp) {
  if (!emp.joinDate) return 0;
  const yrs = Math.max(0, (new Date() - new Date(emp.joinDate)) / (365.25 * 86400000));
  const wage = (+emp.basic || 0) + (+emp.housing || 0) + (+emp.transport || 0) + (+emp.other || 0);
  return Math.min(yrs, 5) * 0.5 * wage + Math.max(0, yrs - 5) * wage;
}
/* رصيد الإجازة السنوي حسب نظام العمل: 21 يوم، و30 بعد 5 سنوات */
function annualEntitlement(emp) {
  if (!emp.joinDate) return 21;
  const years = (new Date() - new Date(emp.joinDate)) / (365.25 * 86400000);
  return years >= 5 ? 30 : 21;
}

/* ─── التطبيق ─── */
function App() {
  useFont();
  const [session, setSession] = useState(undefined); // undefined = جاري فحص الجلسة
  const [recovery, setRecovery] = useState(false);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");

  /* جلسة Supabase Auth — تبقى محفوظة بالجهاز */
  useEffect(() => {
    sb.auth.getSession().then(({ data: d }) => setSession(d.session));
    const { data: sub } = sb.auth.onAuthStateChange((ev, s) => {
      setSession(s);
      if (ev === "PASSWORD_RECOVERY") setRecovery(true);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setData(null); setLoading(false); return; }
    setLoading(true);
    loadData().then((d) => {
      setData(d ? normalize(d) : null);
      setLoading(false);
    });
  }, [session && session.user.id]);

  /* تحديث البيانات عند الرجوع للتبويب */
  useEffect(() => {
    if (!session) return;
    const onFocus = () => { if (document.visibilityState === "visible") loadData().then((d) => d && setData(normalize(d))); };
    document.addEventListener("visibilitychange", onFocus);
    window.addEventListener("focus", onFocus);
    return () => { document.removeEventListener("visibilitychange", onFocus); window.removeEventListener("focus", onFocus); };
  }, [session && session.user.id]);

  const update = async (fn) => {
    const next = fn(structuredClone(data));
    setData(next);
    const ok = await saveData(next);
    if (!ok) setErr("تعذر الحفظ — تأكد من الاتصال وحاول مرة ثانية");
    else setErr("");
    return ok;
  };
  const logout = () => sb.auth.signOut();
  const email = ((session && session.user.email) || "").toLowerCase();

  if (session === undefined || loading)
    return (
      <div dir="rtl" style={{ ...font, minHeight: "100vh", display: "grid", placeItems: "center", background: C.paper, color: C.sub }}>
        جاري التحميل…
      </div>
    );

  if (!session) return <AuthScreen />;
  if (recovery) return <NewPassword onDone={() => setRecovery(false)} />;

  if (!data)
    return <Setup email={email} onDone={(d) => { const nd = normalize(d); setData(nd); saveData(nd); }} />;

  const emp = data.employees.find((e) => (e.email || "").toLowerCase() === email);
  const isAdmin = data.adminEmail && data.adminEmail.toLowerCase() === email;

  const shellWrap = (inner) => (
    <div dir="rtl" style={{ ...font, minHeight: "100vh", background: C.paper, color: C.ink }}>
      {err && <div style={{ background: C.dangerSoft, color: C.danger, padding: "10px 20px", fontSize: 13, textAlign: "center" }}>{err}</div>}
      {inner}
    </div>
  );

  if (isAdmin) return shellWrap(<AdminApp data={data} update={update} onLogout={logout} />);
  if (emp && emp.archived) return <Terminated emp={emp} logout={logout} />;
  if (emp) return shellWrap(<EmpApp data={data} update={update} empId={emp.id} onLogout={logout} />);
  if (!data.adminEmail) return <ClaimAdmin data={data} email={email} update={update} logout={logout} />;
  return <NotLinked email={email} logout={logout} />;
}

function AuthScreen() {
  const [mode, setMode] = useState("in"); // in | up
  const [stage, setStage] = useState("form"); // form | sent | reset
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [e, setE] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);
  const [showResend, setShowResend] = useState(false);

  const go = async () => {
    if (!email.includes("@")) return setE("اكتب إيميل صحيح");
    if (pw.length < 6) return setE("كلمة المرور ٦ أحرف على الأقل");
    setE(""); setInfo(""); setShowResend(false); setBusy(true);
    try {
      if (mode === "in") {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
        if (error) {
          setE(trAuthErr(error.message));
          if (error.message.includes("not confirmed")) setShowResend(true);
        }
      } else {
        const { data, error } = await sb.auth.signUp({ email: email.trim(), password: pw });
        if (error) {
          setE(trAuthErr(error.message));
          if (error.message.includes("already registered")) { setMode("in"); setInfo("حسابك موجود — سجل دخول بكلمة مرورك"); setE(""); }
        } else if (data.user && data.user.identities && data.user.identities.length === 0) {
          /* إيميل مسجل من قبل — Supabase ما يفصح صراحة لحماية الخصوصية */
          setMode("in"); setInfo("هذا الإيميل مسجل من قبل — سجل دخول"); 
        } else if (!data.session) {
          setStage("sent"); /* بانتظار تأكيد الإيميل */
        }
      }
    } finally { setBusy(false); }
  };

  const resend = async () => {
    setBusy(true);
    const { error } = await sb.auth.resend({ type: "signup", email: email.trim() });
    setBusy(false);
    if (error) setE(trAuthErr(error.message));
    else { setE(""); setInfo("أعدنا إرسال رسالة التأكيد — افتح بريدك"); setShowResend(false); }
  };

  const forgot = async () => {
    if (!email.includes("@")) return setE("اكتب إيميلك أول ثم اضغط نسيت كلمة المرور");
    setBusy(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin });
    setBusy(false);
    if (error) setE(trAuthErr(error.message));
    else setStage("reset");
  };

  if (stage === "sent")
    return (
      <AuthShell>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>📬</div>
          <h1 style={{ fontSize: 19, fontWeight: 800, margin: "0 0 8px" }}>أنشأنا حسابك — باقي خطوة وحدة</h1>
          <p style={{ fontSize: 14, color: C.sub, lineHeight: 2, marginTop: 0 }}>
            أرسلنا رسالة تأكيد إلى<br /><b dir="ltr">{email}</b><br />
            افتح بريدك واضغط رابط التفعيل، وبعدها ارجع هنا وسجل دخول.
          </p>
          <div style={{ fontSize: 12.5, color: C.sub, marginBottom: 14 }}>ما وصلتك؟ شيّك على مجلد Spam أو أعد الإرسال.</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <Btn kind="ghost" onClick={resend}>إعادة الإرسال</Btn>
            <Btn kind="gold" onClick={() => { setStage("form"); setMode("in"); setInfo(""); }}>سجلت؟ ادخل الآن</Btn>
          </div>
        </div>
      </AuthShell>
    );

  if (stage === "reset")
    return (
      <AuthShell>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>🔑</div>
          <h1 style={{ fontSize: 19, fontWeight: 800, margin: "0 0 8px" }}>أرسلنا رابط الاستعادة</h1>
          <p style={{ fontSize: 14, color: C.sub, lineHeight: 2, marginTop: 0 }}>
            افتح بريدك <b dir="ltr">{email}</b> واضغط الرابط — بيرجعك هنا لتعيين كلمة مرور جديدة.
          </p>
          <Btn kind="ghost" onClick={() => setStage("form")}>رجوع</Btn>
        </div>
      </AuthShell>
    );

  return (
    <AuthShell>
      <h1 style={{ fontSize: 21, fontWeight: 800, margin: "0 0 4px" }}>{mode === "in" ? "مرحباً بعودتك 👋" : "إنشاء حساب"}</h1>
      <p style={{ fontSize: 13.5, color: C.sub, marginTop: 0, marginBottom: 18 }}>
        {mode === "in" ? "سجل دخولك لبوابة Coleax" : "للموظفين: استخدم نفس الإيميل المسجل عند الإدارة بملفك."}
      </p>
      <Label>الإيميل</Label>
      <Input type="email" inputMode="email" dir="ltr" value={email} onChange={(ev) => setEmail(ev.target.value)} placeholder="name@example.com" />
      <div style={{ height: 14 }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Label>كلمة المرور</Label>
        {mode === "in" && (
          <button onClick={forgot} style={{ ...font, background: "none", border: "none", color: C.goldDeep, fontSize: 12, cursor: "pointer", padding: 0, marginBottom: 6 }}>
            نسيت كلمة المرور؟
          </button>
        )}
      </div>
      <PwInput value={pw} onChange={(ev) => setPw(ev.target.value)} onEnter={() => !busy && go()} placeholder="٦ أحرف على الأقل" />
      {info && <div style={{ color: C.accent, fontSize: 13, marginTop: 10, background: C.accentSoft, borderRadius: 8, padding: "8px 12px" }}>{info}</div>}
      {e && <div style={{ color: C.danger, fontSize: 13, marginTop: 10, background: C.dangerSoft, borderRadius: 8, padding: "8px 12px" }}>{e}</div>}
      {showResend && (
        <button onClick={resend} style={{ ...font, background: "none", border: "none", color: C.goldDeep, fontSize: 13, cursor: "pointer", marginTop: 8, padding: 0 }}>
          إعادة إرسال رسالة التأكيد ←
        </button>
      )}
      <div style={{ height: 18 }} />
      <Btn kind="gold" style={{ width: "100%", padding: "13px", fontSize: 15, opacity: busy ? 0.6 : 1 }} onClick={() => !busy && go()}>
        {busy ? "لحظة…" : mode === "in" ? "تسجيل الدخول" : "إنشاء الحساب"}
      </Btn>
      <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "16px 0 10px" }}>
        <div style={{ flex: 1, height: 1, background: C.line }} />
        <span style={{ fontSize: 11, color: C.sub }}>أو</span>
        <div style={{ flex: 1, height: 1, background: C.line }} />
      </div>
      <button
        onClick={() => { setMode(mode === "in" ? "up" : "in"); setE(""); setInfo(""); }}
        style={{ ...font, background: "none", border: `1px solid ${C.line}`, borderRadius: 10, padding: "11px", color: C.ink, fontSize: 13.5, fontWeight: 600, cursor: "pointer", width: "100%" }}
      >
        {mode === "in" ? "موظف جديد أو أول مرة؟ أنشئ حسابك" : "عندك حساب؟ سجل دخول"}
      </button>
    </AuthShell>
  );
}

/* تعيين كلمة مرور جديدة بعد رابط الاستعادة */
function NewPassword({ onDone }) {
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [e, setE] = useState("");
  const [busy, setBusy] = useState(false);
  const save = async () => {
    if (pw.length < 6) return setE("كلمة المرور ٦ أحرف على الأقل");
    if (pw !== pw2) return setE("الكلمتين غير متطابقتين");
    setBusy(true);
    const { error } = await sb.auth.updateUser({ password: pw });
    setBusy(false);
    if (error) setE(trAuthErr(error.message));
    else onDone();
  };
  return (
    <AuthShell>
      <h1 style={{ fontSize: 20, fontWeight: 800, margin: "0 0 6px" }}>كلمة مرور جديدة</h1>
      <p style={{ fontSize: 13.5, color: C.sub, marginTop: 0 }}>عيّن كلمة المرور الجديدة لحسابك.</p>
      <Label>كلمة المرور الجديدة</Label>
      <PwInput value={pw} onChange={(ev) => setPw(ev.target.value)} />
      <div style={{ height: 12 }} />
      <Label>تأكيدها</Label>
      <PwInput value={pw2} onChange={(ev) => setPw2(ev.target.value)} onEnter={() => !busy && save()} />
      {e && <div style={{ color: C.danger, fontSize: 13, marginTop: 10 }}>{e}</div>}
      <div style={{ height: 16 }} />
      <Btn kind="gold" style={{ width: "100%", padding: "13px" }} onClick={() => !busy && save()}>{busy ? "لحظة…" : "حفظ والدخول"}</Btn>
    </AuthShell>
  );
}

function AdminOverview({ data, update, go }) {
  const t = todayStr();
  const [ann, setAnn] = useState("");
  const present = activeEmps(data).filter((e) => data.attendance[e.id]?.[t]?.in);
  const onLeave = activeEmps(data).filter((e) => onLeaveToday(data.leaves, e.id, t));
  const pending = data.leaves.filter((l) => l.status === "pending");
  const pendingReq = data.requests.filter((r) => r.status === "pending");
  const alerts = [];
  activeEmps(data).forEach((e) => {
    const iq = daysUntil(e.iqamaExpiry);
    const ct = daysUntil(e.contractEnd);
    if (iq !== null && iq <= 60) alerts.push({ name: e.name, what: "الإقامة", days: iq });
    if (ct !== null && ct <= 60) alerts.push({ name: e.name, what: "العقد", days: ct });
  });
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
        <Stat label="الموظفين" value={activeEmps(data).length} />
        <Stat label="حاضر اليوم" value={`${present.length} / ${data.employees.length}`} />
        <Stat label="في إجازة اليوم" value={onLeave.length} sub={onLeave.map((e) => e.name.split(" ")[0]).join("، ") || undefined} />

      </div>

      <Card>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <Megaphone size={17} color={C.goldDeep} />
          <div style={{ fontWeight: 700 }}>إعلان للموظفين</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Input value={ann} onChange={(ev) => setAnn(ev.target.value)} placeholder="مثال: بكرة دوام من البيت / اجتماع الساعة ١٠…" />
          <Btn
            kind="gold"
            style={{ whiteSpace: "nowrap" }}
            onClick={() => {
              if (!ann.trim()) return;
              update((d) => {
                d.employees.filter((x) => !x.archived).forEach((e) => notify(d, e.id, `📢 ${ann.trim()}`));
                return d;
              });
              setAnn("");
            }}
          >
            إرسال
          </Btn>
        </div>
        <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>يوصل إشعار لجميع الموظفين فوراً.</div>
      </Card>

      <Card>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>النسخ الاحتياطي</div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 12 }}>نزّل نسخة كاملة من بيانات النظام (JSON) واحتفظ فيها بمكان آمن — وتقدر تستعيدها بأي وقت.</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Btn kind="ghost" onClick={() => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `coleax-backup-${todayStr()}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
          }}>تنزيل نسخة احتياطية</Btn>
          <label style={{ ...font, display: "inline-block" }}>
            <span style={{ display: "inline-block", padding: "10px 18px", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: "pointer", background: "transparent", color: C.ink, border: `1px solid ${C.line}` }}>استعادة من نسخة</span>

        {activeEmps(data).length === 0 ? (
          <Empty>ما فيه موظفين بعد — أضفهم من تبويب «الموظفين»</Empty>

          activeEmps(data).map((e) => {
            const rec = data.attendance[e.id]?.[t];
            const lm = lateMin(rec, e);
            const hol = isHoliday(data.holidays, t);
            const leave = onLeaveToday(data.leaves, e.id, t);
            return (

function AdminEmployees({ data, update }) {
  const [view, setView] = useState(null); // null | {mode:'new'} | {mode:'edit', emp} | {mode:'profile', id}
  if (view?.mode === "new" || view?.mode === "edit")
    return (
      <EmpForm
        initial={view.mode === "new" ? emptyEmp : view.emp}
        isNew={view.mode === "new"}
        onCancel={() => setView(view.mode === "edit" ? { mode: "profile", id: view.emp.id } : null)}
        onSave={(emp) => {
          update((d) => {
            if (view.mode === "new") d.employees.push({ ...emp, id: uid() });
            else d.employees = d.employees.map((x) => (x.id === emp.id ? emp : x));
            return d;
          });
          setView(view.mode === "edit" ? { mode: "profile", id: emp.id } : null);
        }}
        onDelete={
          view.mode === "edit"
            ? () => {
                if (!confirm("متأكد من حذف الموظف وكل سجلاته؟")) return;
                update((d) => {
                  const id = view.emp.id;
                  d.employees = d.employees.filter((x) => x.id !== id);
                  delete d.attendance[id];
                  d.leaves = d.leaves.filter((l) => l.empId !== id);
                  d.requests = d.requests.filter((r) => r.empId !== id);
                  d.assets = d.assets.filter((a) => a.empId !== id);
                  d.penalties = d.penalties.filter((p) => p.empId !== id);
                  return d;
                });
                setView(null);
              }
            : null
        }
      />
    );
  if (view?.mode === "profile") {
    const emp = data.employees.find((x) => x.id === view.id);
    if (!emp) { setView(null); return null; }
    return <EmpProfile data={data} update={update} emp={emp} onEdit={() => setView({ mode: "edit", emp })} onBack={() => setView(null)} />;
  }
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <Btn kind="gold" onClick={() => setView({ mode: "new" })}>+ إضافة موظف</Btn>
      </div>

        {data.employees.length === 0 ? (
          <Empty>أضف أول موظف عشان يبدأ النظام يشتغل</Empty>
        ) : (
          data.employees.map((e) => {

              <Row key={e.id}>
                <div>
                  <div style={{ fontWeight: 700 }}>{e.name} {e.archived && <Tag tone="sub">منتهي خدمته</Tag>}</div>
                  <div style={{ fontSize: 13, color: C.sub }}>

/* إخلاء طرف وتصفية نهاية الخدمة */
function Clearance({ data, update, emp, onBack, onDone }) {
  const [endDate, setEndDate] = useState(todayStr());
  const [reason, setReason] = useState("employer"); // employer | expiry | resign
  const [extra, setExtra] = useState("");
  const [note, setNote] = useState("");
  const gross = (+emp.basic || 0) + (+emp.housing || 0) + (+emp.transport || 0) + (+emp.other || 0);
  const years = emp.joinDate ? Math.max(0, (new Date(endDate) - new Date(emp.joinDate)) / (365.25 * 86400000)) : 0;
  const fullEos = Math.min(years, 5) * 0.5 * gross + Math.max(0, years - 5) * gross;
  const factor = reason !== "resign" ? 1 : years < 2 ? 0 : years < 5 ? 1 / 3 : years < 10 ? 2 / 3 : 1;
  const eos = fullEos * factor;
  const leaveDays = Math.max(0, annualEntitlement(emp) - usedLeaveDays(data.leaves, emp.id));
  const leaveComp = leaveDays * (gross / 30);
  const advRem = data.advances.filter((a) => a.empId === emp.id).reduce((x, a) => x + Math.max(0, a.amount - a.paid), 0);
  const penRem = data.penalties.filter((p) => p.empId === emp.id && !p.settled && +p.amount > 0).reduce((x, p) => x + +p.amount, 0);
  const unreturned = data.assets.filter((a) => a.empId === emp.id && !a.returned);
  const net = eos + leaveComp + (+extra || 0) - advRem - penRem;
  const L = ({ label, val, minus }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${C.line}`, fontSize: 14 }}>
      <span style={{ color: C.sub }}>{label}</span>
      <span style={{ fontWeight: 600, color: minus ? C.danger : C.ink }}>{minus ? "−" : ""}{fmtMoney(Math.abs(val))} ر.س</span>
    </div>
  );
  const confirmClear = () => {
    if (!confirm(`تأكيد إنهاء خدمة ${emp.name} وتصفية مستحقاته؟ ما يقدر يدخل النظام بعدها.`)) return;
    const rec = {
      id: uid(), empId: emp.id, name: emp.name, role: emp.role, joinDate: emp.joinDate, endDate, reason,
      years: +years.toFixed(2), eos, leaveDays, leaveComp, advRem, penRem, extra: +extra || 0, note, net,
      created: new Date().toISOString(),
    };
    update((d) => {
      d.clearances.push(rec);
      d.employees = d.employees.map((x) => (x.id === emp.id ? { ...x, archived: true, contractEnd: endDate } : x));
      d.advances.forEach((a) => { if (a.empId === emp.id) a.paid = a.amount; });
      d.penalties.forEach((p) => { if (p.empId === emp.id) p.settled = true; });
      notify(d, emp.id, `تم إنهاء خدمتك وتصفية مستحقاتك — صافي التصفية ${fmtMoney(net)} ر.س`);
      return d;
    });
    onDone(rec);
  };
  return (
    <Card style={{ maxWidth: 580, margin: "0 auto" }}>
      <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 2 }}>إخلاء طرف — {emp.name}</div>
      <div style={{ fontSize: 13, color: C.sub, marginBottom: 14 }}>مدة الخدمة حتى تاريخ الإنهاء: {years.toFixed(1)} سنة</div>
      {unreturned.length > 0 && (
        <div style={{ background: C.warnSoft, color: C.warn, borderRadius: 10, padding: "10px 14px", fontSize: 13.5, marginBottom: 14 }}>
          ⚠️ عنده عهد ما رجعها: {unreturned.map((a) => a.name).join("، ")} — استرجعها من ملفه قبل الإخلاء أو كمّل على مسؤوليتك.
        </div>
      )}
      <div style={{ display: "grid", gap: 12, gridTemplateColumns: "1fr 1fr" }}>
        <div><Label>تاريخ انتهاء الخدمة</Label><Input type="date" value={endDate} onChange={(ev) => setEndDate(ev.target.value)} /></div>
        <div>
          <Label>نوع الإنهاء (يحدد نسبة المكافأة نظاماً)</Label>
          <Select value={reason} onChange={(ev) => setReason(ev.target.value)}>
            <option value="employer">إنهاء من صاحب العمل</option>
            <option value="expiry">انتهاء مدة العقد</option>
            <option value="resign">استقالة</option>
          </Select>
        </div>
      </div>
      <div style={{ height: 14 }} />
      <L label={`مكافأة نهاية الخدمة${reason === "resign" ? ` (استقالة — ${years < 2 ? "لا تستحق" : years < 5 ? "الثلث" : years < 10 ? "الثلثان" : "كاملة"})` : ""}`} val={eos} />
      <L label={`بدل رصيد الإجازات (${leaveDays} يوم)`} val={leaveComp} />
      {advRem > 0 && <L label="سلف متبقية" val={advRem} minus />}
      {penRem > 0 && <L label="جزاءات غير مخصومة" val={penRem} minus />}
      <div style={{ display: "grid", gap: 12, gridTemplateColumns: "1fr 1fr", marginTop: 14 }}>
        <div><Label>تسوية إضافية (اكتب سالب للخصم)</Label><Input type="number" inputMode="decimal" dir="ltr" value={extra} onChange={(ev) => setExtra(ev.target.value)} /></div>
        <div><Label>ملاحظة</Label><Input value={note} onChange={(ev) => setNote(ev.target.value)} /></div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", padding: "16px 0 4px", fontWeight: 800, fontSize: 19 }}>
        <span>صافي التصفية</span>
        <span style={{ color: net < 0 ? C.danger : C.goldDeep }}>{fmtMoney(net)} ر.س</span>
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginBottom: 14 }}>التأكيد يسوّي السلف والجزاءات، يؤرشف الموظف (ما يدخل النظام)، ويصدر مخالصة نهائية PDF.</div>
      <div style={{ display: "flex", gap: 10 }}>
        <Btn kind="primary" onClick={confirmClear}>تأكيد الإخلاء وإصدار المخالصة</Btn>
        <Btn kind="ghost" onClick={onBack}>رجوع</Btn>
      </div>
    </Card>
  );
}

  }, [month]);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <CalendarDays size={17} color={C.goldDeep} />

        <div style={{ display: "grid", gap: 10, gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))" }}>
          <div><Label>الاسم</Label><Input value={h.name} onChange={(ev) => setH({ ...h, name: ev.target.value })} placeholder="عيد الفطر" /></div>
          <div><Label>من</Label><Input type="date" value={h.from} onChange={(ev) => setH({ ...h, from: ev.target.value })} /></div>
          <div><Label>إلى</Label><Input type="date" value={h.to} onChange={(ev) => setH({ ...h, to: ev.target.value })} /></div>
        </div>
        <div style={{ height: 12 }} />
        <Btn
          kind="gold"
          onClick={() => {
            if (!h.name.trim() || !h.from) return;
            update((d) => { d.holidays.push({ id: uid(), name: h.name.trim(), from: h.from, to: h.to || h.from }); return d; });
            setH({ name: "", from: "", to: "" });
          }}
        >
          إضافة عطلة
        </Btn>
        <div style={{ height: 8 }} />
        {data.holidays.length === 0 ? (
          <Empty>ما فيه عطل مسجلة</Empty>
        ) : (
          [...data.holidays].sort((a, b) => a.from.localeCompare(b.from)).map((x) => (
            <Row key={x.id}>
              <div style={{ fontSize: 14 }}>
                <b>{x.name}</b> <span style={{ color: C.sub }}>· {fmtDate(x.from)}{x.to !== x.from ? ` → ${fmtDate(x.to)}` : ""}</span>
              </div>
              <Btn kind="danger" style={{ padding: "6px 12px", fontSize: 12 }} onClick={() => update((d) => { d.holidays = d.holidays.filter((y) => y.id !== x.id); return d; })}>حذف</Btn>
            </Row>
          ))
        )}
        <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>أيام العطل ما تنحسب غياب على الموظفين.</div>
      </Card>
      <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontWeight: 700 }}>سجل الحضور</div>
        <Input type="month" value={month} onChange={(e) => setMonth(e.target.value)} style={{ width: 170 }} />
      </div>
      {activeEmps(data).length === 0 ? (
        <Empty>ما فيه موظفين</Empty>
      ) : (
        activeEmps(data).map((emp) => {
          const recs = days.map((d) => ({ d, r: data.attendance[emp.id]?.[d] })).filter((x) => x.r?.in);
          const lates = recs.map(({ r }) => lateMin(r, emp)).filter((m) => m > 0);
          const totalLate = lates.reduce((s, m) => s + m, 0);
          return (
            <div key={emp.id} style={{ marginBottom: 18 }}>
              <div style={{ fontWeight: 700, marginBottom: 6, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                {emp.name}
                <span style={{ color: C.sub, fontWeight: 400, fontSize: 13 }}>
                  · {recs.length} يوم حضور · دوامه {emp.workStart || "—"}–{emp.workEnd || "—"}
                </span>
                {lates.length > 0 && <Tag tone="warn">تأخر {lates.length} مرة · {totalLate} دقيقة</Tag>}
              </div>
              {recs.length === 0 ? (
                <div style={{ fontSize: 13, color: C.sub }}>لا يوجد حضور هذا الشهر</div>
              ) : (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {recs.map(({ d, r }) => {
                    const lm = lateMin(r, emp);
                    return (
                      <span key={d} style={{ fontSize: 12, background: lm > 0 ? C.warnSoft : "#F1F0EC", color: lm > 0 ? C.warn : C.ink, borderRadius: 8, padding: "4px 9px" }}>
                        {d.slice(8)} · {r.in}{r.out ? `–${r.out}` : ""}{lm > 0 ? ` (+${lm}د)` : ""}
                      </span>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })
      )}
    </Card>
    </div>
  );
}

/* ─── الطلبات (مدير): إجازات + طلبات الخدمة الذاتية ─── */
const REQ_LABELS = { advance: "طلب سلفة", letter: "خطاب تعريف بالراتب", attn_fix: "تصحيح حضور" };
function reqDesc(r) {
  if (r.type === "advance") return `مبلغ ${fmtMoney(r.payload.amount)} ر.س · قسط ${fmtMoney(r.payload.installment)} شهرياً${r.payload.reason ? ` · ${r.payload.reason}` : ""}`;
  if (r.type === "attn_fix") return `يوم ${fmtDate(r.payload.date)} · حضور ${r.payload.in || "—"}${r.payload.out ? ` · انصراف ${r.payload.out}` : ""}`;
  if (r.type === "letter") return r.payload.to ? `موجه إلى: ${r.payload.to}` : "موجه إلى من يهمه الأمر";
  return "";
}
function AdminRequests({ data, update }) {
  const items = [
    ...data.leaves.map((l) => ({ ...l, _kind: "leave" })),
    ...data.requests.map((r) => ({ ...r, _kind: "req" })),
  ].sort((a, b) => (a.status === "pending" ? -1 : 1) - (b.status === "pending" ? -1 : 1) || (b.created || "").localeCompare(a.created || ""));

  const decideLeave = (id, status) =>
    update((d) => {
      d.leaves = d.leaves.map((x) => (x.id === id ? { ...x, status } : x));
      const l = d.leaves.find((x) => x.id === id);
      notify(d, l.empId, status === "approved" ? `تم اعتماد إجازتك (${LEAVE_TYPES[l.type || "annual"]}) من ${fmtDate(l.from)} إلى ${fmtDate(l.to)}` : `تم رفض طلب إجازتك (${fmtDate(l.from)} – ${fmtDate(l.to)})`);
      return d;
    });

  const decideReq = (id, status) =>
    update((d) => {
      d.requests = d.requests.map((x) => (x.id === id ? { ...x, status, decidedAt: todayStr() } : x));
      const r = d.requests.find((x) => x.id === id);
      if (status === "approved") {
        if (r.type === "advance") {
          d.advances.push({ id: uid(), empId: r.empId, amount: +r.payload.amount, installment: +r.payload.installment, paid: 0, note: "بطلب من الموظف", date: todayStr() });
          notify(d, r.empId, `تمت الموافقة على سلفتك بمبلغ ${fmtMoney(r.payload.amount)} ر.س — تخصم ${fmtMoney(r.payload.installment)} ر.س شهرياً`);
        } else if (r.type === "attn_fix") {
          d.attendance[r.empId] = d.attendance[r.empId] || {};
          const prev = d.attendance[r.empId][r.payload.date] || {};
          d.attendance[r.empId][r.payload.date] = { ...prev, ...(r.payload.in ? { in: r.payload.in } : {}), ...(r.payload.out ? { out: r.payload.out } : {}) };
          notify(d, r.empId, `تم تصحيح حضورك ليوم ${fmtDate(r.payload.date)}`);
        } else if (r.type === "letter") {
          notify(d, r.empId, "خطاب التعريف جاهز — افتحه من صفحة الطلبات");
        }
      } else {
        notify(d, r.empId, `تم رفض ${REQ_LABELS[r.type]}`);
      }
      return d;
    });

  return (
    <Card>
      <div style={{ fontWeight: 700, marginBottom: 12 }}>طلبات الموظفين</div>
      {items.length === 0 ? (
        <Empty>لا توجد طلبات</Empty>
      ) : (
        items.map((l) => {
          const emp = data.employees.find((e) => e.id === l.empId);
          const isLeave = l._kind === "leave";
          return (
            <Row key={l._kind + l.id}>
              <div>
                <div style={{ fontWeight: 600, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  {emp?.name || "—"}
                  <Tag>{isLeave ? `إجازة ${LEAVE_TYPES[l.type || "annual"]}` : REQ_LABELS[l.type]}</Tag>
                </div>
                <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>
                  {isLeave ? `${fmtDate(l.from)} → ${fmtDate(l.to)} · ${l.days} يوم${l.reason ? ` · ${l.reason}` : ""}` : reqDesc(l)}
                </div>
              </div>
              {l.status === "pending" ? (
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn kind="gold" onClick={() => (isLeave ? decideLeave(l.id, "approved") : decideReq(l.id, "approved"))}>اعتماد</Btn>
                  <Btn kind="danger" onClick={() => (isLeave ? decideLeave(l.id, "rejected") : decideReq(l.id, "rejected"))}>رفض</Btn>
                </div>
              ) : (
                <Tag tone={l.status === "approved" ? "green" : "danger"}>{l.status === "approved" ? "معتمد" : "مرفوض"}</Tag>
              )}
            </Row>
          );
        })
      )}
    </Card>
  );
}

const monthLabel = (m) => new Date(m + "-01T00:00:00").toLocaleDateString("ar-SA-u-ca-gregory", { month: "long", year: "numeric" });
/* دقائق التأخير الكلية لموظف خلال شهر */
function monthLateMinutes(data, emp, m) {
  const recs = data.attendance[emp.id] || {};
  return Object.keys(recs).filter((d) => d.startsWith(m)).reduce((s, d) => s + lateMin(recs[d], emp), 0);
}
function workHours(emp) {
  if (!emp.workStart || !emp.workEnd) return 8;
  const [h1, m1] = emp.workStart.split(":").map(Number);
  const [h2, m2] = emp.workEnd.split(":").map(Number);
  const h = (h2 * 60 + m2 - (h1 * 60 + m1)) / 60;
  return h > 0 ? h : 8;
}

function AdminPayroll({ data, update }) {
  const [slip, setSlip] = useState(null);
  const [orderEmp, setOrderEmp] = useState("");
  const [order, setOrder] = useState(null);
  const [docPay, setDocPay] = useState(null);
  const month = todayStr().slice(0, 7);
  const runDone = data.payrollRuns.some((r) => r.month === month);
  const totals = activeEmps(data).reduce(
    (t, e) => {
      const p = payroll(e, data.advances, data.penalties);
      return { net: t.net + p.net, gosi: t.gosi + p.gosiEr, gross: t.gross + p.gross };
    },
    { net: 0, gosi: 0, gross: 0 }
  );
  const runPayroll = () => {
    if (runDone && !confirm("مسير هذا الشهر مسجل من قبل — تسجيله مرة ثانية؟")) return;
    update((d) => {
      d.employees.filter((x) => !x.archived).forEach((e) => {
        const p = payroll(e, d.advances, d.penalties);
        /* خصم أقساط السلف */
        d.advances.forEach((a) => {
          if (a.empId === e.id && a.amount - a.paid > 0) a.paid = Math.min(a.amount, a.paid + a.installment);
        });
        d.penalties.forEach((x) => {
          if (x.empId === e.id && !x.settled && +x.amount > 0) x.settled = true;
        });
        notify(d, e.id, `تم إيداع راتب شهر ${new Date().toLocaleDateString("ar-SA-u-ca-gregory", { month: "long" })} — الصافي ${fmtMoney(p.net)} ر.س`);
      });
      d.payrollRuns.push({ month, date: new Date().toISOString() });
      return d;
    });
  };
  if (slip) return <Payslip emp={slip} advances={data.advances} penalties={data.penalties} onBack={() => setSlip(null)} />;
  if (docPay) return <PayOrderDoc emp={data.employees.find((e) => e.id === docPay.empId)} pay={docPay} onBack={() => setDocPay(null)} />;
  if (order) return <PayOrder data={data} update={update} init={order} onBack={() => setOrder(null)} />;
  const payments = [...(data.payments || [])].sort((a, b) => (b.created || "").localeCompare(a.created || "")).slice(0, 12);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
        <Stat label="إجمالي الرواتب" value={`${fmtMoney(totals.gross)} ر.س`} />
        <Stat label="صافي المدفوع" value={`${fmtMoney(totals.net)} ر.س`} />
        <Stat label="حصة المنشأة GOSI" value={`${fmtMoney(totals.gosi)} ر.س`} sub="شهرياً" />
      </div>

      <Card style={{ border: `1.5px solid ${C.gold}` }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>أمر صرف راتب</div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 12 }}>اختر الموظف — يحسب لك صافي المستحق تلقائياً بكل الخصومات والتأخيرات، وتأكيد الصرف يصدر أمر رسمي PDF.</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Select value={orderEmp} onChange={(ev) => setOrderEmp(ev.target.value)} style={{ maxWidth: 260 }}>
            <option value="">اختر الموظف…</option>
            {activeEmps(data).map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </Select>
          <Btn kind="gold" onClick={() => orderEmp && setOrder({ empId: orderEmp, month })}>إنشاء أمر الصرف</Btn>
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 10 }}>
          <div style={{ fontWeight: 700 }}>مسير الرواتب الشهري</div>
          {activeEmps(data).length > 0 && (
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {runDone && <Tag tone="green">مسير {monthLabel(month)} مسجل</Tag>}
              <Btn kind="gold" onClick={runPayroll}>تسجيل صرف رواتب الشهر</Btn>
            </div>
          )}
        </div>
        {activeEmps(data).length === 0 ? (
          <Empty>ما فيه موظفين</Empty>
        ) : (
          activeEmps(data).map((e) => {
            const p = payroll(e, data.advances, data.penalties);
            return (
              <Row key={e.id}>
                <div>
                  <div style={{ fontWeight: 600 }}>{e.name}</div>
                  <div style={{ fontSize: 13, color: C.sub }}>
                    إجمالي {fmtMoney(p.gross)} · GOSI موظف {fmtMoney(p.gosiEmp)} · خصومات {fmtMoney(p.ded)}{p.adv > 0 ? ` · قسط سلفة ${fmtMoney(p.adv)}` : ""}{p.pen > 0 ? ` · جزاءات ${fmtMoney(p.pen)}` : ""}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <div style={{ fontWeight: 700 }}>{fmtMoney(p.net)} ر.س</div>
                  <Btn kind="ghost" onClick={() => setSlip(e)}>القسيمة</Btn>
                </div>
              </Row>
            );
          })
        )}
        <div style={{ fontSize: 12, color: C.sub, marginTop: 10 }}>
          زر «تسجيل صرف الرواتب» يخصم أقساط السلف من أرصدتها ويرسل إشعار لكل موظف بإيداع راتبه.
        </div>
      </Card>

      {payments.length > 0 && (
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>سجل أوامر الصرف</div>
          {payments.map((pm) => {
            const e = data.employees.find((x) => x.id === pm.empId);
            return (
              <Row key={pm.id}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{e?.name || "—"} — {monthLabel(pm.month)}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>{fmtDate(pm.date)} · صافي {fmtMoney(pm.net)} ر.س</div>
                </div>
                <Btn kind="ghost" style={{ padding: "6px 12px", fontSize: 12 }} onClick={() => setDocPay(pm)}>فتح الأمر</Btn>
              </Row>
            );
          })}
        </Card>
      )}
    </div>
  );
}

/* ─── إنشاء أمر صرف لموظف ─── */
function PayOrder({ data, update, init, onBack }) {
  const emp = data.employees.find((e) => e.id === init.empId);
  const [month, setMonth] = useState(init.month);
  const p = payroll(emp, data.advances, data.penalties);
  const lateTotal = monthLateMinutes(data, emp, month);
  const suggested = Math.round(lateTotal * (p.gross / 30 / workHours(emp) / 60));
  const [lateDed, setLateDed] = useState(String(suggested));
  const [extra, setExtra] = useState("");
  const [note, setNote] = useState("");
  const [done, setDone] = useState(null);
  useEffect(() => { setLateDed(String(Math.round(monthLateMinutes(data, emp, month) * (p.gross / 30 / workHours(emp) / 60)))); }, [month]);
  const net = Math.max(0, p.net - (+lateDed || 0) - (+extra || 0));
  const confirmPay = () => {
    const pay = {
      id: uid(), empId: emp.id, month,
      gross: p.gross, gosi: p.gosiEmp, ded: p.ded, adv: p.adv, pen: p.pen,
      lateMinutes: lateTotal, late: +lateDed || 0, extra: +extra || 0, note,
      net, date: todayStr(), created: new Date().toISOString(),
    };
    update((d) => {
      d.advances.forEach((a) => {
        if (a.empId === emp.id && a.amount - a.paid > 0) a.paid = Math.min(a.amount, a.paid + a.installment);
      });
      d.penalties.forEach((x) => {
        if (x.empId === emp.id && !x.settled && +x.amount > 0) x.settled = true;
      });
      d.payments = d.payments || [];
  d.clearances = d.clearances || [];
      d.payments.push(pay);
      notify(d, emp.id, `تم صرف راتبك لشهر ${monthLabel(month)} — الصافي ${fmtMoney(net)} ر.س${emp.iban ? " على حسابك البنكي" : ""}`);
      return d;
    });
    setDone(pay);
  };
  if (done) return <PayOrderDoc emp={emp} pay={done} onBack={onBack} />;
  const L = ({ label, val, minus }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${C.line}`, fontSize: 14 }}>
      <span style={{ color: C.sub }}>{label}</span>
      <span style={{ fontWeight: 600, color: minus ? C.danger : C.ink }}>{minus ? "−" : ""}{fmtMoney(val)} ر.س</span>
    </div>
  );
  return (
    <Card style={{ maxWidth: 560, margin: "0 auto" }}>
      <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 2 }}>أمر صرف راتب — {emp.name}</div>
      <div style={{ fontSize: 13, color: C.sub, marginBottom: 14 }}>{emp.role || ""}{emp.iban ? ` · ${emp.bank || "بنك"} — ` : ""}{emp.iban && <span dir="ltr">{emp.iban}</span>}</div>
      <Label>شهر الاستحقاق</Label>
      <Input type="month" value={month} onChange={(ev) => setMonth(ev.target.value)} style={{ maxWidth: 180 }} />
      <div style={{ height: 14 }} />
      <L label="إجمالي الراتب (أساسي + بدلات)" val={p.gross} />
      <L label="خصم التأمينات GOSI" val={p.gosiEmp} minus />
      {p.adv > 0 && <L label="قسط سلفة" val={p.adv} minus />}
      {p.pen > 0 && <L label="جزاءات غير مخصومة" val={p.pen} minus />}
      {+emp.deductions > 0 && <L label="خصومات ثابتة" val={emp.deductions} minus />}
      <div style={{ display: "grid", gap: 12, gridTemplateColumns: "1fr 1fr", marginTop: 14 }}>
        <div>
          <Label>خصم التأخير — {lateTotal} دقيقة هذا الشهر (محسوب تلقائياً وقابل للتعديل)</Label>
          <Input type="number" inputMode="decimal" value={lateDed} onChange={(ev) => setLateDed(ev.target.value)} />
        </div>
        <div>
          <Label>خصم إضافي (اختياري)</Label>
          <Input type="number" inputMode="decimal" value={extra} onChange={(ev) => setExtra(ev.target.value)} />
        </div>
      </div>
      <div style={{ height: 12 }} />
      <Label>ملاحظة على الأمر (اختياري)</Label>
      <Input value={note} onChange={(ev) => setNote(ev.target.value)} />
      <div style={{ display: "flex", justifyContent: "space-between", padding: "16px 0 4px", fontWeight: 800, fontSize: 19 }}>
        <span>صافي الصرف</span>
        <span style={{ color: C.goldDeep }}>{fmtMoney(net)} ر.س</span>
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginBottom: 14 }}>تأكيد الصرف يخصم قسط السلفة ويسوّي الجزاءات ويرسل إشعار للموظف ويصدر الأمر الرسمي.</div>
      <div style={{ display: "flex", gap: 10 }}>
        <Btn kind="gold" onClick={confirmPay}>تأكيد الصرف وإصدار الأمر</Btn>
        <Btn kind="ghost" onClick={onBack}>رجوع</Btn>
      </div>
    </Card>
  );
}

    <Shell title={`${greeting}، ${emp.name.split(" ")[0]} 👋`} tabs={tabs} tab={tab} setTab={setTab} onLogout={onLogout} badge={{ الرئيسية: unread }}>
      {tab === "الرئيسية" && <EmpHome data={data} update={update} emp={emp} />}
      {tab === "إجازاتي" && <EmpLeaves data={data} update={update} emp={emp} />}
      {tab === "طلباتي" && <EmpRequests data={data} update={update} emp={emp} />}
      {tab === "راتبي" && <EmpPay data={data} emp={emp} />}
    </Shell>
  );
}

/* ─── مركز الطلبات (موظف): سلفة / خطاب تعريف / تصحيح حضور ─── */
function EmpRequests({ data, update, emp }) {
  const [kind, setKind] = useState(null); // null | advance | letter | attn_fix
  const [p, setP] = useState({});
  const [e, setE] = useState("");
  const [letter, setLetter] = useState(null);
  const mine = data.requests.filter((r) => r.empId === emp.id).sort((a, b) => (b.created || "").localeCompare(a.created || ""));
  const submit = (payload) => {
    update((d) => {
      d.requests.push({ id: uid(), empId: emp.id, type: kind, payload, status: "pending", created: new Date().toISOString() });
      return d;
    });
    setKind(null); setP({}); setE("");
  };
  if (letter) return <SalaryLetter emp={emp} req={letter} onBack={() => setLetter(null)} />;
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "grid", gap: 10, gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))" }}>
        {Object.entries(REQ_LABELS).map(([k, v]) => (
          <button
            key={k}
            onClick={() => { setKind(kind === k ? null : k); setP({}); setE(""); }}
            style={{
              ...font, cursor: "pointer", borderRadius: 14, padding: "16px 10px", fontSize: 14, fontWeight: 700,
              border: `1.5px solid ${kind === k ? C.gold : C.line}`, background: kind === k ? C.goldSoft : "#fff", color: C.ink,
            }}
          >
            {v}
          </button>
        ))}
      </div>

      {kind === "advance" && (
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>طلب سلفة</div>
          <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))" }}>
            <div><Label>المبلغ</Label><Input type="number" inputMode="decimal" value={p.amount || ""} onChange={(ev) => setP({ ...p, amount: ev.target.value })} /></div>
            <div><Label>القسط الشهري المقترح</Label><Input type="number" inputMode="decimal" value={p.installment || ""} onChange={(ev) => setP({ ...p, installment: ev.target.value })} /></div>
          </div>
          <div style={{ height: 12 }} />
          <Label>السبب (اختياري)</Label>
          <Input value={p.reason || ""} onChange={(ev) => setP({ ...p, reason: ev.target.value })} />
          {e && <div style={{ color: C.danger, fontSize: 13, marginTop: 10 }}>{e}</div>}
          <div style={{ height: 14 }} />
          <Btn kind="gold" onClick={() => {
            if (!+p.amount || !+p.installment) return setE("حدد المبلغ والقسط");
            if (+p.installment > +p.amount) return setE("القسط أكبر من المبلغ");
            submit(p);
          }}>إرسال الطلب</Btn>
        </Card>
      )}

      {kind === "letter" && (
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>خطاب تعريف بالراتب</div>
          <div style={{ fontSize: 13, color: C.sub, marginBottom: 12 }}>بعد موافقة الإدارة يتولد الخطاب رسمياً وتقدر تفتحه من هنا.</div>
          <Label>الجهة الموجه لها (اختياري)</Label>
          <Input value={p.to || ""} onChange={(ev) => setP({ ...p, to: ev.target.value })} placeholder="مثال: بنك الراجحي — أو اتركه فارغ (إلى من يهمه الأمر)" />
          <div style={{ height: 14 }} />
          <Btn kind="gold" onClick={() => submit(p)}>إرسال الطلب</Btn>
        </Card>
      )}

      {kind === "attn_fix" && (
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>تصحيح حضور</div>
          <div style={{ fontSize: 13, color: C.sub, marginBottom: 12 }}>نسيت تبصم؟ حدد اليوم والأوقات الصحيحة وبتنعكس بعد الموافقة.</div>
          <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))" }}>
            <div><Label>اليوم</Label><Input type="date" value={p.date || ""} onChange={(ev) => setP({ ...p, date: ev.target.value })} /></div>
            <div><Label>الحضور</Label><Input type="time" value={p.in || ""} onChange={(ev) => setP({ ...p, in: ev.target.value })} /></div>
            <div><Label>الانصراف</Label><Input type="time" value={p.out || ""} onChange={(ev) => setP({ ...p, out: ev.target.value })} /></div>
          </div>
          {e && <div style={{ color: C.danger, fontSize: 13, marginTop: 10 }}>{e}</div>}
          <div style={{ height: 14 }} />
          <Btn kind="gold" onClick={() => {
            if (!p.date || (!p.in && !p.out)) return setE("حدد اليوم ووقت واحد على الأقل");
            submit(p);
          }}>إرسال الطلب</Btn>
        </Card>
      )}

      <Card>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>طلباتي</div>
        {mine.length === 0 ? (
          <Empty>اختر نوع الطلب فوق وقدمه — يوصل للإدارة فوراً</Empty>
        ) : (
          mine.map((r) => (
            <Row key={r.id}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{REQ_LABELS[r.type]}</div>
                <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>{reqDesc(r)}</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <Tag tone={r.status === "approved" ? "green" : r.status === "rejected" ? "danger" : "warn"}>
                  {r.status === "approved" ? "معتمد" : r.status === "rejected" ? "مرفوض" : "قيد المراجعة"}
                </Tag>
                {r.type === "letter" && r.status === "approved" && (
                  <Btn kind="ghost" style={{ padding: "6px 12px", fontSize: 12 }} onClick={() => setLetter(r)}>فتح الخطاب</Btn>
                )}
              </div>
            </Row>
          ))
        )}
      </Card>
    </div>
  );
}

/* خطاب تعريف رسمي متولد تلقائياً */
function SalaryLetter({ emp, req, onBack }) {
  const p = payroll(emp);
  const today = new Date().toLocaleDateString("ar-SA-u-ca-gregory", { day: "numeric", month: "long", year: "numeric" });
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card className="print-area" style={{ maxWidth: 640, margin: "0 auto", width: "100%", boxSizing: "border-box", padding: "34px 30px", lineHeight: 2 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 26 }}>
          <Logo size={0.75} />
          <div style={{ fontSize: 12, color: C.sub, textAlign: "left" }}>
            التاريخ: {today}<br />الرقم: HR-{req.id.toUpperCase()}
          </div>
        </div>
        <div style={{ textAlign: "center", fontWeight: 700, fontSize: 17, marginBottom: 18 }}>خطاب تعريف بالراتب</div>
        <div style={{ fontSize: 14.5 }}>
          <div style={{ marginBottom: 10 }}>إلى: {req.payload?.to?.trim() || "من يهمه الأمر"}</div>
          <div style={{ marginBottom: 10 }}>السلام عليكم ورحمة الله وبركاته، وبعد:</div>
          <div>
            تشهد مؤسسة إس إن دي لاين (SndLine Group) بأن {emp.nationality === "saudi" ? "المواطن" : "المقيم"} / <b>{emp.name}</b>
            {emp.role ? <> يعمل لديها بوظيفة <b>{emp.role}</b></> : <> يعمل لديها</>}
            {emp.joinDate ? <> منذ تاريخ {fmtDate(emp.joinDate)}</> : null}
            ، ويتقاضى راتباً إجمالياً قدره <b>{fmtMoney(p.gross)} ريال سعودي</b> شهرياً
            {+emp.basic > 0 ? <> (أساسي {fmtMoney(emp.basic)}{+emp.housing > 0 ? ` + سكن ${fmtMoney(emp.housing)}` : ""}{+emp.transport > 0 ? ` + مواصلات ${fmtMoney(emp.transport)}` : ""})</> : null}
            ، ولا يزال على رأس عمله حتى تاريخه.
          </div>
          <div style={{ marginTop: 10 }}>وقد أُعطي هذا الخطاب بناءً على طلبه دون أدنى مسؤولية على المؤسسة تجاه الغير.</div>
          <div style={{ marginTop: 28, textAlign: "left" }}>
            <div style={{ fontWeight: 700 }}>الموارد البشرية</div>
            <div style={{ color: C.sub, fontSize: 13 }}>SndLine Group — مؤسسة إس إن دي لاين</div>
          </div>
        </div>
      </Card>
      <div className="no-print" style={{ textAlign: "center", display: "flex", gap: 10, justifyContent: "center" }}>
        <PdfBtn />
        <Btn kind="ghost" onClick={onBack}>رجوع</Btn>
      </div>
    </div>
  );
}

function EmpPay({ data, emp }) {
  const myAdv = data.advances.filter((a) => a.empId === emp.id && a.amount - a.paid > 0);
  const myPens = data.penalties.filter((x) => x.empId === emp.id);
  const yrs = emp.joinDate ? ((new Date() - new Date(emp.joinDate)) / (365.25 * 86400000)).toFixed(1) : null;
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Payslip emp={emp} advances={data.advances} penalties={data.penalties} onBack={null} />
      {yrs && (
        <Card style={{ maxWidth: 520, margin: "0 auto", width: "100%", boxSizing: "border-box" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14 }}>مكافأة نهاية الخدمة المستحقة</div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>مدة خدمتك {yrs} سنة</div>
            </div>
            <div style={{ fontWeight: 700, fontSize: 18, color: C.goldDeep }}>{fmtMoney(eosGratuity(emp))} ر.س</div>
          </div>
        </Card>
      )}
      {myPens.length > 0 && (
        <Card style={{ maxWidth: 520, margin: "0 auto", width: "100%", boxSizing: "border-box" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>الجزاءات</div>
          {myPens.map((x) => (
            <Row key={x.id}>
              <div style={{ fontSize: 14 }}>
                {PEN_TYPES[x.type]}{x.amount > 0 ? ` — ${fmtMoney(x.amount)} ر.س` : ""}
                <div style={{ fontSize: 12, color: C.sub }}>{fmtDate(x.date)}{x.note ? ` · ${x.note}` : ""}</div>
              </div>
              {x.amount > 0 && <Tag tone={x.settled ? "sub" : "warn"}>{x.settled ? "خُصم" : "سيُخصم"}</Tag>}
            </Row>
          ))}
        </Card>
      )}
      {myAdv.length > 0 && (
        <Card style={{ maxWidth: 520, margin: "0 auto", width: "100%", boxSizing: "border-box" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>سلفي القائمة</div>
          {myAdv.map((a) => (
            <Row key={a.id}>
              <div style={{ fontSize: 14 }}>سلفة {fmtMoney(a.amount)} ر.س · قسط {fmtMoney(a.installment)}</div>
              <Tag tone="warn">متبقي {fmtMoney(a.amount - a.paid)}</Tag>
            </Row>
          ))}
        </Card>
      )}
    </div>
  );
}

function EmpHome({ data, update, emp }) {
  const t = todayStr();
  const rec = data.attendance[emp.id]?.[t];
  const ent = annualEntitlement(emp);
  const used = usedLeaveDays(data.leaves, emp.id);
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const i = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(i);
  }, []);
  const stamp = (field) =>
    update((d) => {
      d.attendance[emp.id] = d.attendance[emp.id] || {};
      d.attendance[emp.id][t] = { ...(d.attendance[emp.id][t] || {}), [field]: nowTime() };
      return d;
    });
  const myNotifs = data.notifications.filter((n) => n.empId === emp.id).slice(0, 15);
  const hasUnread = myNotifs.some((n) => !n.read);
  const lm = lateMin(rec, emp);
  const hol = isHoliday(data.holidays, t);
  const myAssets = data.assets.filter((a) => a.empId === emp.id && !a.returned);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      {hol && (
        <Card style={{ background: C.goldSoft, border: `1px solid ${C.gold}`, textAlign: "center", padding: 14 }}>
          <span style={{ fontWeight: 700 }}>🎉 اليوم عطلة رسمية — {hol.name}</span>
        </Card>
      )}
      <Card style={{ textAlign: "center", padding: "30px 20px 34px", background: C.ink, border: "none", color: "#fff" }}>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,.6)" }}>{now.toLocaleDateString("ar-SA-u-ca-gregory", { weekday: "long", day: "numeric", month: "long" })}</div>
        <div style={{ fontSize: 52, fontWeight: 200, letterSpacing: 1, margin: "8px 0 2px", fontVariantNumeric: "tabular-nums" }}>
          {now.toTimeString().slice(0, 5)}
        </div>
        <div style={{ display: "flex", justifyContent: "center", margin: "0 0 10px" }}><Mark s={20} /></div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,.6)", marginBottom: 18 }}>دوامك {emp.workStart || "—"} – {emp.workEnd || "—"}</div>
        {!rec?.in ? (
          <Btn kind="gold" style={{ padding: "15px 52px", fontSize: 16, borderRadius: 14 }} onClick={() => stamp("in")}>تسجيل حضور</Btn>
        ) : !rec.out ? (
          <>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <Tag tone="green">حضرت الساعة {rec.in}</Tag>
              {lm > 0 && <Tag tone="warn">متأخر {lm} دقيقة</Tag>}
            </div>
            <div style={{ height: 16 }} />
            <Btn kind="gold" style={{ padding: "15px 52px", fontSize: 16, borderRadius: 14 }} onClick={() => stamp("out")}>تسجيل انصراف</Btn>
          </>
        ) : (
          <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
            <Tag tone="green">حضور {rec.in}</Tag>
            <Tag>انصراف {rec.out}</Tag>
            {lm > 0 && <Tag tone="warn">تأخير {lm} دقيقة</Tag>}
          </div>
        )}
      </Card>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
        <Stat label="رصيد الإجازة السنوية" value={`${ent - used} يوم`} sub={`استخدمت ${used} من ${ent}`} />
        <Stat label="أيام حضورك هذا الشهر" value={Object.keys(data.attendance[emp.id] || {}).filter((d) => d.startsWith(t.slice(0, 7)) && data.attendance[emp.id][d]?.in).length} />
      </div>
      {myAssets.length > 0 && (
        <Card>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <Package size={16} color={C.goldDeep} />
            <div style={{ fontWeight: 700 }}>عهدتي</div>
          </div>
          {myAssets.map((a) => (
            <div key={a.id} style={{ fontSize: 14, padding: "7px 0", borderBottom: `1px solid ${C.line}` }}>
              {a.name} <span style={{ fontSize: 12, color: C.sub }}>· منذ {fmtDate(a.date)}</span>
            </div>
          ))}
        </Card>
      )}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontWeight: 700 }}>الإشعارات</div>
          {hasUnread && (
            <Btn kind="ghost" style={{ padding: "6px 12px", fontSize: 12 }} onClick={() => update((d) => { d.notifications = d.notifications.map((n) => (n.empId === emp.id ? { ...n, read: true } : n)); return d; })}>
              تحديد الكل كمقروء
            </Btn>
          )}
        </div>
        {myNotifs.length === 0 ? (
          <Empty>ما فيه إشعارات</Empty>
        ) : (
          myNotifs.map((n) => (
            <div key={n.id} style={{ padding: "10px 0", borderBottom: `1px solid ${C.line}`, display: "flex", gap: 10, alignItems: "flex-start" }}>
              {!n.read && <span style={{ width: 8, height: 8, borderRadius: 99, background: C.accent, marginTop: 6, flexShrink: 0 }} />}
              <div>
                <div style={{ fontSize: 14, fontWeight: n.read ? 400 : 600 }}>{n.text}</div>
                <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{new Date(n.date).toLocaleDateString("ar-SA-u-ca-gregory", { day: "numeric", month: "long" })}</div>
              </div>
            </div>
          ))
        )}
      </Card>
    </div>
  );
}

function EmpLeaves({ data, update, emp }) {
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [type, setType] = useState("annual");
  const [reason, setReason] = useState("");
  const [e, setE] = useState("");
  const mine = data.leaves.filter((l) => l.empId === emp.id).sort((a, b) => b.created.localeCompare(a.created));
  const ent = annualEntitlement(emp);
  const used = usedLeaveDays(data.leaves, emp.id);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>طلب إجازة</div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 14 }}>رصيدك من السنوية: {ent - used} يوم — المرضية وبدون راتب ما تنخصم منه</div>
        <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))" }}>
          <div>
            <Label>النوع</Label>
            <Select value={type} onChange={(ev) => setType(ev.target.value)}>
              {Object.entries(LEAVE_TYPES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </Select>
          </div>
          <div><Label>من</Label><Input type="date" value={from} onChange={(ev) => setFrom(ev.target.value)} /></div>
          <div><Label>إلى</Label><Input type="date" value={to} onChange={(ev) => setTo(ev.target.value)} /></div>
        </div>
        <div style={{ height: 12 }} />
        <Label>السبب (اختياري)</Label>
        <Input value={reason} onChange={(ev) => setReason(ev.target.value)} />
        {e && <div style={{ color: C.danger, fontSize: 13, marginTop: 10 }}>{e}</div>}
        <div style={{ height: 14 }} />
        <Btn
          kind="gold"
          onClick={() => {
            if (!from || !to) return setE("حدد التاريخين");
            const days = daysBetween(from, to);
            if (days < 1) return setE("تاريخ النهاية قبل البداية");
            update((d) => {
              d.leaves.push({ id: uid(), empId: emp.id, from, to, days, type, reason, status: "pending", created: new Date().toISOString() });
              return d;
            });
            setFrom(""); setTo(""); setReason(""); setE("");
          }}
        >
          إرسال الطلب
        </Btn>
      </Card>
      <Card>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>طلباتي السابقة</div>
        {mine.length === 0 ? (
          <Empty>ما قدمت أي طلب بعد</Empty>
        ) : (
          mine.map((l) => (
            <Row key={l.id}>
              <div style={{ fontSize: 14 }}>
                <Tag>{LEAVE_TYPES[l.type || "annual"]}</Tag> {fmtDate(l.from)} → {fmtDate(l.to)} · {l.days} يوم
              </div>
              <Tag tone={l.status === "approved" ? "green" : l.status === "rejected" ? "danger" : "warn"}>
                {l.status === "approved" ? "معتمدة" : l.status === "rejected" ? "مرفوضة" : "قيد المراجعة"}
              </Tag>
            </Row>
          ))
        )}
      </Card>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
